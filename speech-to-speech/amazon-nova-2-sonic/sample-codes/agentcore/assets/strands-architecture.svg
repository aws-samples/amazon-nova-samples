<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <style>
      .box { fill: white; stroke: #333; stroke-width: 2; }
      .client-box { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; }
      .runtime-box { fill: #F3E5F5; stroke: #7B1FA2; stroke-width: 2; }
      .gateway-box { fill: #FFF3E0; stroke: #F57C00; stroke-width: 2; }
      .mcp-box { fill: #E8F5E9; stroke: #388E3C; stroke-width: 2; }
      .kb-box { fill: #FCE4EC; stroke: #C2185B; stroke-width: 2; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 13px; fill: #555; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #444; font-weight: 600; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; font-style: italic; }
      .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title" style="font-size: 20px;">Strands Banking Agent - MCP Gateway Architecture</text>
  
  <!-- Client Layer -->
  <rect x="50" y="70" width="200" height="120" rx="8" class="client-box"/>
  
  <!-- Browser Icon -->
  <g transform="translate(150, 100)">
    <!-- Monitor/Browser -->
    <rect x="-25" y="-8" width="50" height="35" rx="2" fill="none" stroke="#1976D2" stroke-width="2"/>
    <rect x="-25" y="-8" width="50" height="5" fill="#1976D2"/>
    <circle cx="-18" cy="-5.5" r="1" fill="white"/>
    <circle cx="-13" cy="-5.5" r="1" fill="white"/>
    <circle cx="-8" cy="-5.5" r="1" fill="white"/>
    <!-- Stand -->
    <line x1="-8" y1="27" x2="8" y2="27" stroke="#1976D2" stroke-width="2"/>
    <line x1="0" y1="27" x2="0" y2="32" stroke="#1976D2" stroke-width="2"/>
  </g>
  
  <text x="150" y="145" text-anchor="middle" class="title">Web Client</text>
  <text x="150" y="163" text-anchor="middle" class="subtitle">(Browser)</text>
  <text x="150" y="182" text-anchor="middle" class="small-text">Voice &amp; Text</text>
  
  <!-- Arrow: Client to Runtime -->
  <path d="M 250 130 L 380 130" class="arrow"/>
  <text x="315" y="120" text-anchor="middle" class="arrow-label">WebSocket</text>
  <text x="315" y="135" text-anchor="middle" class="arrow-label">SigV4 Auth</text>
  
  <!-- AgentCore Runtime -->
  <rect x="380" y="70" width="240" height="120" rx="8" class="runtime-box"/>
  
  <!-- AgentCore Icon (embedded from agentcore.svg) -->
  <g transform="translate(500, 100) scale(0.12)">
    <!-- Simplified AgentCore icon -->
    <polygon fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" points="102.77 37.56 102.77 163.02 78.76 171.14 46.56 152.18 46.56 126.84 27.9 115.86 27.9 84.72 46.33 73.81 46.33 48.4 78.84 29.72 102.77 37.56"/>
    <line fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" x1="65.33" y1="63.71" x2="65.33" y2="38.73"/>
    <line fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" x1="62.74" y1="139.69" x2="103.32" y2="115.79"/>
    <line fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" x1="86.53" y1="149.78" x2="65.71" y2="162.9"/>
    <line fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" x1="63.28" y1="115.79" x2="45.93" y2="126.73"/>
    <polyline fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" points="81.06 55.86 81.06 73.81 65.33 84.88 46.33 73.81"/>
    <polyline fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" points="51.94 105.49 65.33 97.45 65.33 85.58"/>
    <line fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" x1="78.72" y1="105.49" x2="65.33" y2="97.45"/>
    <path fill="none" stroke="#7B1FA2" stroke-linejoin="round" stroke-width="6px" d="M139.93,88.57l25.05,10.04c1.49.6,1.48,2.71-.02,3.29l-24.51,9.47-10.2,25.29c-.61,1.5-2.74,1.47-3.3-.05l-9.22-24.93-25.52-9.76c-1.51-.58-1.52-2.72,0-3.3l24.84-9.63,9.86-25.14c.59-1.5,2.7-1.5,3.29,0l9.75,24.73h-.02Z"/>
    <path fill="#7B1FA2" d="M165.25,66.92l9.5,3.81c.41.16.4.74,0,.9l-9.3,3.59-3.87,9.59c-.17.41-.75.4-.9-.01l-3.5-9.46-9.68-3.7c-.41-.16-.41-.74,0-.9l9.43-3.66,3.74-9.53c.16-.41.74-.41.9,0l3.7,9.38h-.02Z"/>
  </g>
  
  <text x="500" y="145" text-anchor="middle" class="title">AgentCore Runtime</text>
  <text x="500" y="163" text-anchor="middle" class="subtitle">(Container - ARM64)</text>
  <text x="500" y="182" text-anchor="middle" class="small-text">BidiAgent + Nova Sonic</text>
  
  <!-- Arrow: Runtime to Gateways -->
  <path d="M 500 190 L 500 260" class="arrow"/>
  <text x="520" y="225" class="arrow-label">MCP Protocol</text>
  
  <!-- Gateway Layer Title -->
  <text x="600" y="280" text-anchor="middle" class="section-title">4 MCP Gateways (Managed Service)</text>
  
  <!-- Gateway 1: Auth -->
  <rect x="50" y="300" width="240" height="100" rx="8" class="gateway-box"/>
  
  <!-- Lock Icon -->
  <g transform="translate(170, 330)">
    <rect x="-6" y="0" width="12" height="10" rx="1" fill="none" stroke="#F57C00" stroke-width="1.5"/>
    <path d="M -4,-4 Q -4,-8 0,-8 Q 4,-8 4,-4" fill="none" stroke="#F57C00" stroke-width="1.5"/>
    <circle cx="0" cy="5" r="1.5" fill="#F57C00"/>
  </g>
  
  <text x="170" y="355" text-anchor="middle" class="title">Auth Gateway</text>
  <text x="170" y="345" text-anchor="middle" class="small-text">auth-tools-xxxxx</text>
  <text x="170" y="365" text-anchor="middle" class="small-text" style="font-size: 10px;">• authenticate_user</text>
  <text x="170" y="380" text-anchor="middle" class="small-text" style="font-size: 10px;">• verify_identity</text>
  
  <!-- Gateway 2: Banking -->
  <rect x="310" y="300" width="240" height="100" rx="8" class="gateway-box"/>
  
  <!-- Dollar Icon -->
  <g transform="translate(430, 330)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#F57C00" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" style="font-size: 14px; font-weight: bold; fill: #F57C00;">$</text>
  </g>
  
  <text x="430" y="355" text-anchor="middle" class="title">Banking Gateway</text>
  <text x="430" y="345" text-anchor="middle" class="small-text">banking-tools-xxxxx</text>
  <text x="430" y="365" text-anchor="middle" class="small-text" style="font-size: 10px;">• get_account_balance</text>
  <text x="430" y="380" text-anchor="middle" class="small-text" style="font-size: 10px;">• get_recent_transactions</text>
  <text x="430" y="395" text-anchor="middle" class="small-text" style="font-size: 10px;">• transfer_funds, get_summary</text>
  
  <!-- Gateway 3: Mortgage -->
  <rect x="570" y="300" width="240" height="100" rx="8" class="gateway-box"/>
  
  <!-- House Icon -->
  <g transform="translate(690, 330)">
    <path d="M -8,0 L 0,-8 L 8,0 L 8,8 L -8,8 Z" fill="none" stroke="#F57C00" stroke-width="1.5"/>
    <rect x="-3" y="2" width="6" height="6" fill="none" stroke="#F57C00" stroke-width="1.5"/>
  </g>
  
  <text x="690" y="355" text-anchor="middle" class="title">Mortgage Gateway</text>
  <text x="690" y="345" text-anchor="middle" class="small-text">mortgage-tools-xxxxx</text>
  <text x="690" y="365" text-anchor="middle" class="small-text" style="font-size: 10px;">• get_mortgage_rates</text>
  <text x="690" y="380" text-anchor="middle" class="small-text" style="font-size: 10px;">• calculate_payment</text>
  <text x="690" y="395" text-anchor="middle" class="small-text" style="font-size: 10px;">• check_eligibility, get_status</text>
  
  <!-- Gateway 4: FAQ KB -->
  <rect x="830" y="300" width="240" height="100" rx="8" class="gateway-box"/>
  
  <!-- Question Mark / Help Icon -->
  <g transform="translate(950, 330)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#F57C00" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" style="font-size: 14px; font-weight: bold; fill: #F57C00;">?</text>
  </g>
  
  <text x="950" y="355" text-anchor="middle" class="title">FAQ KB Gateway</text>
  <text x="950" y="345" text-anchor="middle" class="small-text">faq-kb-tools-xxxxx</text>
  <text x="950" y="365" text-anchor="middle" class="small-text" style="font-size: 10px;">• search_anybank_faq</text>
  <text x="950" y="380" text-anchor="middle" class="small-text" style="font-size: 10px;">• answer_anybank_question</text>
  
  <!-- Arrows: Gateways to MCP Servers -->
  <path d="M 170 400 L 170 480" class="arrow"/>
  <path d="M 430 400 L 430 480" class="arrow"/>
  <path d="M 690 400 L 690 480" class="arrow"/>
  <path d="M 950 400 L 950 480" class="arrow"/>
  
  <!-- MCP Server Layer Title -->
  <text x="600" y="470" text-anchor="middle" class="section-title">MCP Server Implementations</text>
  
  <!-- MCP Server 1: Auth -->
  <rect x="50" y="490" width="240" height="80" rx="8" class="mcp-box"/>
  <text x="170" y="515" text-anchor="middle" class="title">auth_mcp.py</text>
  <text x="170" y="535" text-anchor="middle" class="small-text">Authentication logic</text>
  <text x="170" y="553" text-anchor="middle" class="small-text" style="font-size: 10px;">Static JSON responses</text>
  
  <!-- MCP Server 2: Banking -->
  <rect x="310" y="490" width="240" height="80" rx="8" class="mcp-box"/>
  <text x="430" y="515" text-anchor="middle" class="title">banking_mcp.py</text>
  <text x="430" y="535" text-anchor="middle" class="small-text">Banking operations</text>
  <text x="430" y="553" text-anchor="middle" class="small-text" style="font-size: 10px;">Static JSON responses</text>
  
  <!-- MCP Server 3: Mortgage -->
  <rect x="570" y="490" width="240" height="80" rx="8" class="mcp-box"/>
  <text x="690" y="515" text-anchor="middle" class="title">mortgage_mcp.py</text>
  <text x="690" y="535" text-anchor="middle" class="small-text">Mortgage calculations</text>
  <text x="690" y="553" text-anchor="middle" class="small-text" style="font-size: 10px;">Static JSON responses</text>
  
  <!-- MCP Server 4: FAQ KB -->
  <rect x="830" y="490" width="240" height="80" rx="8" class="mcp-box"/>
  <text x="950" y="515" text-anchor="middle" class="title">faq_kb_mcp.py</text>
  <text x="950" y="535" text-anchor="middle" class="small-text">FAQ retrieval &amp; RAG</text>
  <text x="950" y="553" text-anchor="middle" class="small-text" style="font-size: 10px;">Bedrock KB integration</text>
  
  <!-- Arrow: FAQ MCP to Knowledge Base -->
  <path d="M 950 570 L 950 640" class="arrow"/>
  <text x="970" y="605" class="arrow-label">Query</text>
  
  <!-- Knowledge Base -->
  <rect x="830" y="650" width="240" height="100" rx="8" class="kb-box"/>
  
  <!-- Database Icon -->
  <g transform="translate(950, 680)">
    <ellipse cx="0" cy="-5" rx="8" ry="3" fill="none" stroke="#C2185B" stroke-width="1.5"/>
    <line x1="-8" y1="-5" x2="-8" y2="5" stroke="#C2185B" stroke-width="1.5"/>
    <line x1="8" y1="-5" x2="8" y2="5" stroke="#C2185B" stroke-width="1.5"/>
    <ellipse cx="0" cy="5" rx="8" ry="3" fill="none" stroke="#C2185B" stroke-width="1.5"/>
  </g>
  
  <text x="950" y="705" text-anchor="middle" class="title">Bedrock Knowledge Base</text>
  <text x="950" y="695" text-anchor="middle" class="subtitle">anybank-faq</text>
  <text x="950" y="715" text-anchor="middle" class="small-text" style="font-size: 10px;">• Account policies</text>
  <text x="950" y="730" text-anchor="middle" class="small-text" style="font-size: 10px;">• Fees &amp; charges</text>
  <text x="950" y="745" text-anchor="middle" class="small-text" style="font-size: 10px;">• Security &amp; fraud info</text>
  
  <!-- Benefits Box -->
  <rect x="50" y="650" width="720" height="100" rx="8" style="fill: #F5F5F5; stroke: #999; stroke-width: 2; stroke-dasharray: 5,5;"/>
  <text x="410" y="675" text-anchor="middle" class="section-title">Benefits of MCP Gateway Architecture</text>
  <text x="410" y="695" text-anchor="middle" class="small-text">✓ Centralized tool management  •  ✓ Independent gateway updates  •  ✓ Reusable across agents</text>
  <text x="410" y="713" text-anchor="middle" class="small-text">✓ Managed authentication &amp; authorization  •  ✓ Scalable tool execution</text>
  <text x="410" y="731" text-anchor="middle" class="small-text">✓ Separation of concerns  •  ✓ Version control per gateway</text>
  
  <!-- Legend -->
  <text x="50" y="790" class="section-title">Component Legend:</text>
  <rect x="50" y="800" width="30" height="20" rx="3" class="client-box"/>
  <text x="90" y="815" class="small-text">Client Layer</text>
  
  <rect x="200" y="800" width="30" height="20" rx="3" class="runtime-box"/>
  <text x="240" y="815" class="small-text">Runtime Layer</text>
  
  <rect x="370" y="800" width="30" height="20" rx="3" class="gateway-box"/>
  <text x="410" y="815" class="small-text">Gateway Layer</text>
  
  <rect x="550" y="800" width="30" height="20" rx="3" class="mcp-box"/>
  <text x="590" y="815" class="small-text">MCP Servers</text>
  
  <rect x="720" y="800" width="30" height="20" rx="3" class="kb-box"/>
  <text x="760" y="815" class="small-text">Knowledge Base</text>
  
  <!-- Footer -->
  <text x="600" y="870" text-anchor="middle" class="small-text" style="font-style: italic; fill: #999;">
    Amazon Bedrock AgentCore • Model Context Protocol (MCP) • Strands BidiAgent SDK
  </text>
</svg>
