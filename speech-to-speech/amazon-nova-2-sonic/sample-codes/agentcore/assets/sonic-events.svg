<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 620" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <marker id="ar-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0" />
    </marker>
    <marker id="ar-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32" />
    </marker>
    <marker id="ar-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e65100" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#000">Nova Sonic Direct — Event Protocol Flow</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#666">Client → Server (relay) → Bedrock Runtime bidirectional stream</text>

  <!-- Column headers -->
  <rect x="40" y="60" width="120" height="30" rx="6" fill="#e3f2fd" stroke="#90caf9" />
  <text x="100" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#1565c0">Client</text>

  <rect x="310" y="60" width="160" height="30" rx="6" fill="#e8f5e9" stroke="#a5d6a7" />
  <text x="390" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">Server (Relay)</text>

  <rect x="620" y="60" width="120" height="30" rx="6" fill="#fff3e0" stroke="#ffcc80" />
  <text x="680" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">Nova Sonic</text>

  <!-- Lifelines -->
  <line x1="100" y1="90" x2="100" y2="600" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="390" y1="90" x2="390" y2="600" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="680" y1="90" x2="680" y2="600" stroke="#ffcc80" stroke-width="1.5" stroke-dasharray="4,3" />

  <!-- Phase 1: Session Init -->
  <rect x="15" y="100" width="750" height="18" rx="3" fill="#f5f5f5" stroke="none" />
  <text x="390" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#888">SESSION INITIALIZATION</text>

  <!-- sessionStart -->
  <line x1="105" y1="130" x2="385" y2="130" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <line x1="395" y1="130" x2="675" y2="130" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <rect x="155" y="118" width="110" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="210" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">sessionStart</text>
  <text x="210" y="145" text-anchor="middle" font-size="8" fill="#666">maxTokens, temperature, topP</text>

  <!-- Phase 2: Prompt Setup -->
  <rect x="15" y="158" width="750" height="18" rx="3" fill="#f5f5f5" stroke="none" />
  <text x="390" y="171" text-anchor="middle" font-size="9" font-weight="700" fill="#888">PROMPT SETUP</text>

  <!-- promptStart -->
  <line x1="105" y1="188" x2="385" y2="188" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <line x1="395" y1="188" x2="675" y2="188" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <rect x="155" y="176" width="110" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="210" y="189" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">promptStart</text>
  <text x="210" y="203" text-anchor="middle" font-size="8" fill="#666">audio/text output config, tool definitions</text>

  <!-- contentStart (TEXT) + textInput + contentEnd -->
  <line x1="105" y1="218" x2="385" y2="218" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <line x1="395" y1="218" x2="675" y2="218" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <rect x="120" y="206" width="200" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="220" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">contentStart → textInput → contentEnd</text>
  <text x="220" y="233" text-anchor="middle" font-size="8" fill="#666">system prompt (TEXT block)</text>

  <!-- Phase 3: Audio Streaming -->
  <rect x="15" y="246" width="750" height="18" rx="3" fill="#f5f5f5" stroke="none" />
  <text x="390" y="259" text-anchor="middle" font-size="9" font-weight="700" fill="#888">BIDIRECTIONAL AUDIO STREAMING</text>

  <!-- contentStart (AUDIO) -->
  <line x1="105" y1="276" x2="385" y2="276" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <line x1="395" y1="276" x2="675" y2="276" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <rect x="140" y="264" width="150" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="215" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">contentStart (AUDIO)</text>
  <text x="215" y="291" text-anchor="middle" font-size="8" fill="#666">begin user audio block</text>

  <!-- audioInput streaming -->
  <line x1="105" y1="306" x2="385" y2="306" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <line x1="395" y1="306" x2="675" y2="306" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <rect x="160" y="294" width="100" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="210" y="307" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">audioInput</text>
  <text x="210" y="321" text-anchor="middle" font-size="8" fill="#666">base64 PCM 16kHz chunks (continuous)</text>

  <line x1="105" y1="333" x2="385" y2="333" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#ar-blue)" />
  <text x="245" y="346" text-anchor="middle" font-size="8" font-style="italic" fill="#999">streaming audio...</text>

  <!-- audioOutput from Bedrock -->
  <line x1="675" y1="365" x2="395" y2="365" stroke="#e65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-orange)" />
  <line x1="385" y1="365" x2="105" y2="365" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ar-green)" />
  <rect x="145" y="353" width="120" height="18" rx="3" fill="#e8f5e9" stroke="none" />
  <text x="205" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">audioOutput</text>
  <text x="205" y="380" text-anchor="middle" font-size="8" fill="#666">base64 PCM 24kHz (split if >10KB)</text>

  <!-- textOutput from Bedrock -->
  <line x1="675" y1="395" x2="395" y2="395" stroke="#e65100" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-orange)" />
  <line x1="385" y1="395" x2="105" y2="395" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ar-green)" />
  <rect x="155" y="383" width="100" height="18" rx="3" fill="#e8f5e9" stroke="none" />
  <text x="205" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">textOutput</text>
  <text x="205" y="410" text-anchor="middle" font-size="8" fill="#666">agent speech transcript</text>

  <!-- Phase 4: Tool Use -->
  <rect x="15" y="423" width="750" height="18" rx="3" fill="#f5f5f5" stroke="none" />
  <text x="390" y="436" text-anchor="middle" font-size="9" font-weight="700" fill="#888">TOOL USE (if triggered)</text>

  <!-- toolUse from Bedrock -->
  <line x1="675" y1="455" x2="395" y2="455" stroke="#e65100" stroke-width="1.5" marker-end="url(#ar-orange)" />
  <rect x="460" y="443" width="100" height="18" rx="3" fill="#fff3e0" stroke="none" />
  <text x="510" y="456" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">toolUse</text>
  <text x="535" y="470" text-anchor="middle" font-size="8" fill="#666">tool name, ID, params</text>

  <!-- Server processes tool + forwards to client -->
  <line x1="385" y1="465" x2="105" y2="465" stroke="#2e7d32" stroke-width="1" marker-end="url(#ar-green)" />
  <text x="245" y="478" text-anchor="middle" font-size="8" fill="#666">forwarded to client for display</text>

  <!-- toolResult back to Bedrock -->
  <line x1="395" y1="495" x2="675" y2="495" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <rect x="430" y="483" width="170" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="515" y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">contentStart → toolResult → contentEnd</text>
  <text x="515" y="510" text-anchor="middle" font-size="8" fill="#666">async task result (e.g. getDateTool)</text>

  <!-- Phase 5: Session End -->
  <rect x="15" y="523" width="750" height="18" rx="3" fill="#f5f5f5" stroke="none" />
  <text x="390" y="536" text-anchor="middle" font-size="9" font-weight="700" fill="#888">SESSION TEARDOWN</text>

  <!-- sessionEnd -->
  <line x1="105" y1="555" x2="385" y2="555" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <line x1="395" y1="555" x2="675" y2="555" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <rect x="160" y="543" width="100" height="18" rx="3" fill="#e3f2fd" stroke="none" />
  <text x="210" y="556" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">sessionEnd</text>
  <text x="210" y="570" text-anchor="middle" font-size="8" fill="#666">close bidirectional stream</text>

  <!-- Legend -->
  <rect x="40" y="590" width="700" height="18" rx="3" fill="none" stroke="none" />
  <line x1="50" y1="600" x2="75" y2="600" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar-blue)" />
  <text x="80" y="603" font-size="8" fill="#555">Client → Bedrock</text>
  <line x1="200" y1="600" x2="225" y2="600" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ar-green)" />
  <text x="230" y="603" font-size="8" fill="#555">Bedrock → Client</text>
  <line x1="350" y1="600" x2="375" y2="600" stroke="#e65100" stroke-width="1.5" marker-end="url(#ar-orange)" />
  <text x="380" y="603" font-size="8" fill="#555">Bedrock response</text>
  <line x1="490" y1="600" x2="515" y2="600" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar-blue)" />
  <text x="520" y="603" font-size="8" fill="#555">Server relay (passthrough)</text>
</svg>
